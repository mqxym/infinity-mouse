name: Python Package Release

on:
  release:
    types: [published]
  push:
    branches:
        - main 

permissions:
  contents: read
  packages: write 

jobs:
  test:
    name: Test on Multiple Python Versions
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12','3.13',"3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
    
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
    
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pip install flake8

      - name: Install Linux Test System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Script in Test Mode
        if: runner.os != 'Linux'
        run: |
          python run.py --test
        continue-on-error: true  # Avoid failing workflow due to timeout

      - name: Run Script in Test Mode (Linux via Xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a python run.py --test
        continue-on-error: true  # Avoid failing workflow due to timeout
    
  
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel twine

      - name: Build Distributions
        run: |
          python setup.py sdist bdist_wheel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
        id-token: write
    #environment:
    #  name: pypi
    if: >
      github.event_name == 'release' &&
      github.event.action == 'published'

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

